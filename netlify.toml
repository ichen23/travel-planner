[build]
  command = "npm run build"
  publish = "dist"

# API 重定向
[[redirects]]
  from = "/api/*"
  to = "https://travel-planner-production-d703.up.railway.app/api/:splat"
  status = 200
  force = true

# 根路径重定向到 index.html
[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200
  force = true

# 所有其他路径重定向到 index.html (SPA 支持)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = true

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "sh -c 'cd /app/backend && uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}'"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[deploy.healthcheck]
type = "HTTP"
path = "/api/health"
interval = 30
timeout = 10
retries = 3
startPeriod = 30

[[deploy.environment]]
name = "PORT"
value = "8000"

[[deploy.environment]]
name = "HOST"
value = "0.0.0.0"
